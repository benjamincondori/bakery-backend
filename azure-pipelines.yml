trigger:
  branches:
    include:
      - main

variables:
  - group: bakery-secrets
  - name: acrLoginServer
    value: 'bakeryreg.azurecr.io'
  - name: imageName
    value: 'backend'
  - name: webAppName
    value: 'bakery-backend'
  - name: resourceGroup
    value: 'rg-bakery'

stages:

- stage: Build
  displayName: '🐳 Build y Push imagen'
  jobs:
  - job: BuildJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: Docker@2
      displayName: 'Login al ACR'
      inputs:
        command: login
        containerRegistry: 'acr-connection'

    - task: Docker@2
      displayName: 'Build imagen Docker'
      inputs:
        command: build
        containerRegistry: 'acr-connection'
        repository: $(imageName)          # ← solo 'backend'
        dockerfile: Dockerfile
        tags: |
          $(Build.BuildId)
          latest

    - task: Docker@2
      displayName: 'Push imagen al ACR'
      inputs:
        command: push
        containerRegistry: 'acr-connection'
        repository: $(imageName)          # ← solo 'backend'
        tags: |
          $(Build.BuildId)
          latest

- stage: Deploy
  displayName: '🚀 Deploy a App Service'
  dependsOn: Build
  jobs:
  - job: DeployJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: AzureAppServiceSettings@1
      displayName: 'Configurar variables de entorno'
      inputs:
        azureSubscription: 'azure-connection'
        appName: $(webAppName)
        resourceGroupName: $(resourceGroup)
        appSettings: |
          [
            {"name": "DATABASE_URL", "value": "$(DATABASE_URL)", "slotSetting": false},
            {"name": "PORT", "value": "3000", "slotSetting": false}
          ]

    - task: AzureWebAppContainer@1
      displayName: 'Deploy al App Service'
      inputs:
        azureSubscription: 'azure-connection'
        appName: $(webAppName)
        containers: $(acrLoginServer)/$(imageName):$(Build.BuildId)